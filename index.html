<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f5f5f5;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.mobile-container{
    width:100%;
    max-width:390px;
    min-height:100vh;
    background:#f5f5f5;
    padding:30px 24px;
}

.logo{
    text-align:center;
    margin-top:40px;
    margin-bottom:40px;
}

.logo h1{
    font-size:42px;
    font-weight:700;
    color:#000;
    letter-spacing:-1px;
}

.logo p{
    margin-top:4px;
    font-size:14px;
    color:#333;
    font-weight:600;
}

.heading{
    font-size:22px;
    font-weight:500;
    margin-bottom:30px;
    color:#222;
}

.input-group{
    margin-bottom:22px;
}

input{
    width:100%;
    height:58px;
    border:1.5px solid #444;
    border-radius:12px;
    padding:0 18px;
    font-size:20px;
    background:#fff;
}

input:focus{
    outline:none;
    border-color:#ff5b2e;
}

.btn{
    width:100%;
    height:56px;
    border:none;
    border-radius:12px;
    background:#ff5b2e;
    color:white;
    font-size:24px;
    font-weight:500;
    cursor:pointer;
    margin-top:10px;
}

.btn:hover{
    opacity:.95;
}

.result{
    margin-top:20px;
    padding:15px;
    border-radius:10px;
    background:#e8f5e9;
    color:#166534;
    font-size:16px;
    word-break:break-word;
}

.error{
    margin-top:20px;
    padding:15px;
    border-radius:10px;
    background:#fee2e2;
    color:#991b1b;
}

.footer{
    margin-top:30px;
    text-align:center;
    color:#555;
}

.footer span{
    color:#ff5b2e;
    font-weight:600;
}

.required{
    color:#ff5b2e;
}

</style>
</head>

<body>

<div class="mobile-container">

    <div class="logo">
        <h1>GlobalLogic</h1>
        <p>A Hitachi Group Company</p>
    </div>

    <div class="heading">
        Create your account
    </div>

    <div class="input-group">
        <input
            id="name"
            type="text"
            placeholder="Enter your name*">
    </div>

    <div class="input-group">
        <input
            id="email"
            type="email"
            placeholder="Email address*">
    </div>

    <button class="btn" onclick="signup()">
        Sign Up
    </button>

    <div id="result"></div>

    <div class="footer">
        Already have an account?
        <span>Sign In</span>
    </div>

</div>

<script>

async function signup(){

    const payload = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value
    };

    if(!payload.name || !payload.email){

        document.getElementById("result").innerHTML =
        '<div class="error">Please enter Name and Email.</div>';

        return;
    }

    try{

        const response = await fetch(
            "https://c03-usa-west.integrate.boomi.com/ws/rest/testflow/testcall",
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json",
                    "Authorization":"Basic " + btoa("globallogic-H8FOJX.9DVSTY:40fb5763-e832-46e1-9410-d94e2d29f313")
                },

                body:JSON.stringify(payload)
            }
        );

        const data = await response.json();

        document.getElementById("result").innerHTML =
        `
        <div class="result">
            Account created successfully.<br><br>
            Customer ID: <strong>${data.id}</strong>
        </div>
        `;

    }
    catch(error){

        document.getElementById("result").innerHTML =
        `
        <div class="error">
            API call failed.<br>
            ${error.message}
        </div>
        `;
    }

}

</script>

</body>
</html>
